version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: xray-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: xray-protocol
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - xray-network

  # Redis (for caching and sessions)
  redis:
    image: redis:7.2-alpine
    container_name: xray-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - xray-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xray-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/xray-protocol?authSource=admin
      REDIS_URL: redis://redis:6379
      ETHEREUM_RPC_URL: http://localhost:8545
      JWT_SECRET: your_super_secret_jwt_key_here_make_it_long_and_random
      ENCRYPTION_KEY: your_32_character_encryption_key_here
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - xray-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xray-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_ETHEREUM_RPC_URL: http://localhost:8545
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - xray-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: xray-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - xray-network

volumes:
  mongodb_data:
  redis_data:

networks:
  xray-network:
    driver: bridge
